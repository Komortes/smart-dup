name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all-targets

      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  build:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_ext: .exe
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_ext: ""

    env:
      BINARY_NAME: smart-dup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE="smart-dup-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${PACKAGE}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.bin_ext }}" "dist/${PACKAGE}/"
          cp README.md "dist/${PACKAGE}/"
          if [[ -f LICENSE ]]; then
            cp LICENSE "dist/${PACKAGE}/"
          fi
          tar -C dist -czf "dist/${PACKAGE}.tar.gz" "${PACKAGE}"
          rm -rf "dist/${PACKAGE}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $package = "smart-dup-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}${{ matrix.bin_ext }}" "dist/$package/"
          Copy-Item README.md "dist/$package/"
          if (Test-Path LICENSE) {
            Copy-Item LICENSE "dist/$package/"
          }
          Compress-Archive -Path "dist/$package/*" -DestinationPath "dist/$package.zip" -Force
          Remove-Item -Recurse -Force "dist/$package"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
